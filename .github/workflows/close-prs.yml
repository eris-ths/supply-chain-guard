name: Close Pull Requests

on:
  pull_request_target:
    types: [opened]

jobs:
  close:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check if author is a collaborator
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: author,
              });
              const level = data.permission;
              const isCollaborator = ['admin', 'write', 'maintain'].includes(level);
              core.setOutput('is_collaborator', isCollaborator.toString());
              console.log(`${author}: permission=${level}, collaborator=${isCollaborator}`);
            } catch {
              core.setOutput('is_collaborator', 'false');
            }

      - name: Close PR from non-collaborator
        if: steps.check.outputs.is_collaborator == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: 'Thank you for your interest! This repository does not accept external pull requests. Please [open an Issue](https://github.com/eris-ths/supply-chain-guard/issues) instead to report threats or suggest improvements.'
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed'
            });
